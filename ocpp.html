<!DOCTYPE html>
<html>
  <head>
    <title>WebUI Charger</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js"></script>
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-black" onload="loadocpp()">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./chargerdata.html">Charger Data</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./ocpp.html">OCPP</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./configuration.html">Config</a>
            </li>
             <li class="nav-item">
              <a class="nav-link" href="./charging.html">Charging</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <h2 class="mt-4 fw-bold text-primary text-center">Setting OCPP</h2>

    <div class="container-sm">
      <label class="form-label text-primary">URL Server</label>
      <input class="form-control" id="url" type="text" autofocus />
      <label class="form-label text-primary">Charger Id</label>
      <input class="form-control" id="chargerid" type="text" />
      <label class="form-label text-primary">Number of connector</label>
      <input class="form-control" id="numgun" type="text" />
      <br />
    </div>

    <div class="d-flex justify-content-center align-items-center">
      <button
        class="btn btn-primary mx-2 mt-4"
        id="savebtn"
        onclick="saveocpp()"
      >
        Save</button
      ><br />
      <button
        class="btn btn-primary mx-2 mt-4"
        id="loadbtn"
        onclick="loadocpp()"
      >
        Load</button
      ><br />
    </div>
  </body>
</html>
