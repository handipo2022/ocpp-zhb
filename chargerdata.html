<!DOCTYPE html>
<html>
  <head>
    <title>WebUI Charger</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js"></script>
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
   
  </head>
  <body class="bg-black" onload="loaddata()">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./chargerdata.html">Charger Data</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./ocpp.html">OCPP</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./configuration.html">Config</a>
            </li>
             <li class="nav-item">
              <a class="nav-link" href="./charging.html">Charging</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <h2 class="mt-4 fw-bold text-primary text-center">Charger Data</h2>
    <div class="container-sm">
      <label class="form-label text-primary">Charge Box SN</label>
      <input class="form-control" id="cbsn" type="text" autofocus />
      <label class="form-label text-primary">Charge Point Model</label>
      <input class="form-control" id="cpmodel" type="text" />
      <label class="form-label text-primary">Charge Point SN</label>
      <input class="form-control" id="cpsn" type="text" />
      <label class="form-label text-primary">Charge Point Vendor</label>
      <input class="form-control" id="cpvendor" type="text" />
      <label class="form-label text-primary">Firmware version</label>
      <input class="form-control" id="fwversion" type="text" />
      <label class="form-label text-primary">ICCID</label>
      <input class="form-control" id="iccid" type="text" />
      <label class="form-label text-primary">IMSI</label>
      <input class="form-control" id="imsi" type="text" />
      <label class="form-label text-primary">Meter SN</label>
      <input class="form-control" id="metersn" type="text" />
      <label class="form-label text-primary">Meter type</label>
      <input class="form-control" id="metertype" type="text" />
    </div>
    <div class="d-flex justify-content-center align-items-center">
      <button
        class="btn btn-primary mx-2 mt-4"
        id="savebtn"
        onclick="savedata()"
      >
        Save
      </button>
      <button
        class="btn btn-primary mx-2 mt-4"
        id="loadbtn"
        onclick="loaddata()"
      >
        Load
      </button>
    </div>
  </body>
</html>
